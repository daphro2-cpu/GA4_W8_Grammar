<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Grammar Practice</title>

<style>

body{
background:#0e1628;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
padding-top:60px;
}

.container{
background:#16233a;
width:600px;
padding:30px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

h1{
text-align:center;
margin-bottom:25px;
}

.question{
font-size:20px;
margin-bottom:20px;
}

.options button{
display:block;
width:100%;
margin:8px 0;
padding:12px;
font-size:16px;
background:#1f2f4d;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.options button:hover{
background:#2d4370;
}

.controls{
margin-top:20px;
display:flex;
justify-content:space-between;
}

.controls button{
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
background:#2d4370;
color:white;
}

.result{
text-align:center;
font-size:22px;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>Grammar Practice</h1>

<div id="questionBox"></div>

<div class="controls">
<button onclick="nextQuestion()">Next</button>
</div>

<div class="result" id="result"></div>

</div>

<script>

const quiz = [

{
q:"Choose the correct imperative:",
options:[
"Don’t open the door.",
"Not open the door.",
"No open the door."
],
answer:0
},

{
q:"Which sentence is correct?",
options:[
"Let’s go to the park.",
"Let’s goes to the park.",
"Let’s going to the park."
],
answer:0
},

{
q:"Teacher says: ______ your books on page 10.",
options:[
"Open",
"Opens",
"Opening"
],
answer:0
},

{
q:"Choose the correct negative imperative:",
options:[
"Don’t touch that!",
"Not touch that!",
"Doesn’t touch that!"
],
answer:0
},

{
q:"I brush my teeth every morning. This is a:",
options:[
"habit",
"order",
"question"
],
answer:0
},

{
q:"The sun rises in the east. This is a:",
options:[
"fact",
"habit",
"command"
],
answer:0
},

{
q:"She ______ to school every day.",
options:[
"go",
"goes",
"going"
],
answer:1
},

{
q:"Tom ______ football after school.",
options:[
"play",
"plays",
"playing"
],
answer:1
},

{
q:"Choose the correct sentence:",
options:[
"He walk to school.",
"He walks to school.",
"He walking to school."
],
answer:1
},

{
q:"Which sentence gives a suggestion?",
options:[
"Let’s watch TV.",
"Watch TV.",
"Don’t watch TV."
],
answer:0
}

];

let current = 0;
let score = 0;

function loadQuestion(){

let q = quiz[current];

let html = `
<div class="question">${current+1}. ${q.q}</div>
<div class="options">
`;

q.options.forEach((opt,i)=>{

html += `<button onclick="checkAnswer(${i})">${opt}</button>`

});

html += "</div>";

document.getElementById("questionBox").innerHTML = html;

}

function checkAnswer(i){

if(i === quiz[current].answer){
score++;
}

}

function nextQuestion(){

current++;

if(current >= quiz.length){

document.getElementById("questionBox").innerHTML="";
document.getElementById("result").innerHTML =
"Score: "+score+" / "+quiz.length;

}else{

loadQuestion();

}

}

loadQuestion();

</script>

</body>
</html>
